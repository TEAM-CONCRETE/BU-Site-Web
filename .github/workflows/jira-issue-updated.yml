name: Update issue from Jira

on:
  repository_dispatch:
    types: [jira-issue-updated]

concurrency:
  group: jira-${{ github.event.client_payload.key || 'unknown' }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  update-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug payload (optional)
        run: echo "${{ toJson(github.event.client_payload) }}"

      - name: Update (or create) by Jira key
        uses: actions/github-script@v7
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ALLOW_CREATE_IF_MISSING: "true" # ← 없는 경우 생성
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const fetch = global.fetch || ((...args) => import('node-fetch').then(({default: f}) => f(...args)));

            const p   = context.payload.client_payload || {};
            const esc = (s) => (s ?? '').toString();
            const has = (s) => !!esc(s).trim();
            const nz  = (s,f='') => { const v = esc(s).trim(); return v ? v : f; };
            const decodeMaybe = (s) => { const str = esc(s); try { const d=/%[0-9A-Fa-f]{2}/.test(str)?decodeURIComponent(str):str; return d.replace(/\+/g,' ');} catch {return str;} };

            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const key   = esc(p.key);

            async function findIssueByKey(k) {
              if (!k) return 0;
              // 1) 정확 매치: [KEY]
              let q = `repo:${owner}/${repo} is:issue in:title "[${k}]"`;
              let res = await github.rest.search.issuesAndPullRequests({ q, per_page: 10 });
              let hit = (res.data.items || []).find(i => i.title.startsWith(`[${k}] `));
              if (hit) return hit.number;
              // 2) 느슨 매치
              q = `repo:${owner}/${repo} is:issue in:title "${k}"`;
              res = await github.rest.search.issuesAndPullRequests({ q, per_page: 10 });
              hit = (res.data.items || []).find(i => i.title.includes(k));
              if (hit) return hit.number;
              // 3) 인덱싱 지연 회피: 리스트 스캔(state: all)
              for (let page=1; page<=3; page++) {
                const list = await github.rest.issues.listForRepo({ owner, repo, state:'all', per_page:100, page });
                const cand = (list.data || []).find(i => typeof i.title === 'string' && (i.title.startsWith(`[${k}]`) || i.title.includes(k)));
                if (cand) return cand.number;
                if ((list.data || []).length < 100) break;
              }
              return 0;
            }

            async function jiraFetch(path) {
              const base = (process.env.JIRA_BASE_URL || '').replace(/\/+$/,'');
              if (!base) return null;
              const res = await fetch(base + path, {
                headers: {
                  'Accept': 'application/json',
                  'Authorization': 'Basic ' + Buffer.from(`${process.env.JIRA_USER_EMAIL}:${process.env.JIRA_API_TOKEN}`).toString('base64')
                }
              });
              return res.ok ? res.json() : null;
            }
            async function fetchJiraDescriptionHTML(k) {
              const data = await jiraFetch(`/rest/api/3/issue/${encodeURIComponent(k)}?expand=renderedFields&fields=description`);
              return data?.renderedFields?.description || '';
            }
            async function fetchJiraCustomFields(k, ids=[]) {
              if (!ids.length) return {};
              const q = encodeURIComponent(ids.join(','));
              const data = await jiraFetch(`/rest/api/3/issue/${encodeURIComponent(k)}?fields=${q}&expand=renderedFields`);
              const rf = data?.renderedFields || {};
              const f  = data?.fields || {};
              const out = {};
              for (const id of ids) out[id] = (rf[id] ?? f[id] ?? '') + '';
              return out;
            }
            function normalizeChecklist(input) {
              const raw = decodeMaybe(input);
              if (!has(raw)) return '';
              const lines = raw.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
              return lines.map(line => {
                if (/^- \[.\] /.test(line)) return line;
                if (/^\[\s?\]\s*/.test(line)) return line.replace(/^\[\s?\]\s*/, '- [ ] ');
                if (/^[\*\-]\s+/.test(line))   return line.replace(/^[\*\-]\s+/, '- [ ] ');
                return `- [ ] ${line}`;
              }).join('\n');
            }

            // 값 준비
            const baseURL    = (process.env.JIRA_BASE_URL || '').replace(/\/+$/,'');
            const urlLink    = (key && baseURL) ? `${baseURL}/browse/${key}` : '';
            const rawKind    = esc(p.kind).toLowerCase();
            const kind       = /^(story|스토리)/.test(rawKind) ? 'story' : (/^(bug|버그)/.test(rawKind) ? 'bug' : 'task');

            const summary    = decodeMaybe(p.summary);
            let   description= decodeMaybe(p.description);
            let   detail     = decodeMaybe(p.detail);
            let   reference  = decodeMaybe(p.reference);
            const initiator  = decodeMaybe(p.initiator);
            const checklist  = normalizeChecklist(p.checklist);

            // Jira 보강
            if (!has(description) && has(key)) {
              const html = await fetchJiraDescriptionHTML(key);
              if (has(html)) description = html;
            }
            if ((!has(detail) || !has(reference)) && has(key)) {
              const got = await fetchJiraCustomFields(key, ['customfield_10113','customfield_10114']);
              if (!has(detail) && has(got['customfield_10113']))  detail    = decodeMaybe(got['customfield_10113']);
              if (!has(reference) && has(got['customfield_10114'])) reference = decodeMaybe(got['customfield_10114']);
            }

            // 템플릿 로드
            const mapping = {
              story: '.github/ISSUE_TEMPLATE/automation-story.md',
              bug:   '.github/ISSUE_TEMPLATE/automation-bug.md',
              task:  '.github/ISSUE_TEMPLATE/automation-task.md'
            };
            const file = mapping[kind] || mapping.task;
            const templatePath = path.join(process.cwd(), file);
            const tpl = fs.existsSync(templatePath) ? fs.readFileSync(templatePath, 'utf8') : '';

            function buildBody() {
              if (!tpl) {
                const parts = [];
                if (has(description)) parts.push('## 🚀 이슈 개요 (Description)', description, '');
                if (has(detail))      parts.push('---', '', '## 🎯 구현 대상', detail, '');
                if (has(checklist))   parts.push('---', '', '### ✅ 완료조건 (To-do)', '', checklist, '');
                if (has(reference))   parts.push('---', '', '### 📎 참고', reference, '');
                if (has(key) || has(urlLink)) {
                  const link = has(urlLink) ? `[**${key}**](${urlLink})` : key;
                  parts.push('---', '', '### 🔗 Jira Link', link);
                }
                return parts.join('\n').trim();
              }
              let body = tpl
                .replaceAll('{{issue.key}}', key)
                .replaceAll('{{key}}', key)
                .replaceAll('{{issue.url}}', urlLink)
                .replaceAll('{{url}}', urlLink)
                .replaceAll('{{issue.summary}}', summary)
                .replaceAll('{{summary}}', summary)
                .replaceAll('{{description}}', has(description) ? description : '')
                .replaceAll('{{detail}}', has(detail) ? detail : '')
                .replaceAll('{{issue.reference}}', reference)
                .replaceAll('{{reference}}', reference)
                .replaceAll('{{initiator}}', has(initiator) ? initiator : '');
              const checklistBlock = has(checklist) ? `\n${checklist}\n` : '';
              if (tpl.includes('{{checklist}}')) body = body.replaceAll('{{checklist}}', checklistBlock);
              else if (has(checklist)) body += `\n\n---\n\n### ✅ 완료조건 (To-do)\n\n${checklist}\n`;
              return body.trim();
            }

            // 대상 이슈 찾기 → 없으면 생성
            let issue_number = await findIssueByKey(key);
            if (!issue_number && process.env.ALLOW_CREATE_IF_MISSING === 'true') {
              // 인덱싱 지연 대비: 한 번 더 재시도(짧게 대기)
              await new Promise(r => setTimeout(r, 1500));
              issue_number = await findIssueByKey(key);
            }

            if (!issue_number && process.env.ALLOW_CREATE_IF_MISSING === 'true') {
              const title = `[${key}] ${summary || ''}`.trim();
              const body  = buildBody();

              // 라벨
              const allowed = new Set(['Feature','Refactor','Documentation','Story','Bug','Task']);
              let labels = [];
              if (kind === 'story') labels = ['Story'];
              else if (kind === 'bug') labels = ['Bug'];
              else {
                let incoming = [];
                const raw = p.labels;
                if (Array.isArray(raw)) incoming = raw;
                else if (typeof raw === 'string') {
                  try { const parsed = JSON.parse(raw); if (Array.isArray(parsed)) incoming = parsed; }
                  catch { incoming = esc(raw).split(',').map(s=>s.trim()).filter(Boolean); }
                }
                labels = incoming.map(v => v && v[0].toUpperCase()+v.slice(1).toLowerCase())
                                 .filter(v => allowed.has(v));
                if (!labels.length) labels = ['Task'];
              }

              const created = await github.rest.issues.create({ owner, repo, title, body, labels });
              issue_number = created.data.number;
              core.info(`Created issue #${issue_number} for ${key}`);
            }

            if (!issue_number) {
              core.setFailed(`Target GitHub issue not found by key=${key}`);
              return;
            }

            // 업데이트 적용
            const cur = await github.rest.issues.get({ owner, repo, issue_number });
            const curTitle = cur.data.title || '';
            const curBody  = cur.data.body  || '';
            const nextTitle = `[${nz(key, curTitle)}] ${nz(summary, curTitle)}`;
            const nextBody  = buildBody();

            if (nextTitle !== curTitle || nextBody !== curBody) {
              await github.rest.issues.update({ owner, repo, issue_number, title: nextTitle, body: nextBody });
            }

            // 라벨 갱신(Story/Bug 고정)
            const allowed = new Set(['Feature','Refactor','Documentation','Story','Bug']);
            let computed = [];
            if (kind === 'story') computed = ['Story'];
            else if (kind === 'bug') computed = ['Bug'];
            else {
              let incoming = [];
              const raw = p.labels;
              if (Array.isArray(raw)) incoming = raw;
              else if (typeof raw === 'string') {
                try { const parsed = JSON.parse(raw); incoming = Array.isArray(parsed) ? parsed : esc(raw).split(',').map(s=>s.trim()).filter(Boolean); }
                catch { incoming = esc(raw).split(',').map(s=>s.trim()).filter(Boolean); }
              }
              const toTitle = s => s ? s[0].toUpperCase()+s.slice(1).toLowerCase() : s;
              computed = incoming.map(toTitle).filter(v => allowed.has(v) && v !== 'Story' && v !== 'Bug');
            }
            if (computed.length) {
              await github.rest.issues.setLabels({ owner, repo, issue_number, labels: computed });
            }

            core.info(`Patched #${issue_number} for key=${key}`);
